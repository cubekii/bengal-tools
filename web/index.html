<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengal Compiler Explorer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1e1e1e; overflow: hidden; }
        
        /* Syntax highlighting */
        .keyword { color: #569cd6; }
        .keyword-operator { color: #d4d4d4; }
        .keyword-import { color: #c586c0; }
        .string { color: #ce9178; }
        .string-escape { color: #d7ba7d; }
        .number-float { color: #b5cea8; }
        .number-int { color: #b5cea8; }
        .comment { color: #6a9955; font-style: italic; }
        .comment-block { color: #6a9955; font-style: italic; }
        .type { color: #4ec9b0; }
        .primitive-type { color: #4ec9b0; }
        .function { color: #dcdcaa; }
        .constant { color: #569cd6; }
        .interpolation { color: #d4d4d4; }
        .interpolation-punct { color: #d4d4d4; }
        .module-path { color: #4ec9b0; }
        .variable { color: #9cdcfe; }
        .text { color: #ffffff; }
        
        /* Error styling */
        .error { color: #f48771; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
